<title>PhotoLibraryExplorer</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f5;
}
header {
    background: #1f2937;
    color: white;
    padding: 14px 18px;
}
nav {
    background: white;
    padding: 10px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    box-shadow: 0 1px 4px #ccc;
}
nav button {
    padding: 9px 14px;
    border: 0;
    border-radius: 8px;
    background: #e5e7eb;
    font-size: 15px;
}
nav button.active {
    background: #2563eb;
    color: white;
}
section {
    display: none;
    padding: 14px;
}
section.active {
    display: block;
}
#map {
    width: 100%;
    height: calc(100vh - 135px);
}
.panel {
    background: white;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
}
input[type=text] {
    width: 95%;
    padding: 8px;
}
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}
th, td {
    border-bottom: 1px solid #ddd;
    padding: 7px;
    text-align: left;
}
th {
    background: #eee;
    position: sticky;
    top: 0;
}
.card {
    background: white;
    padding: 14px;
    border-radius: 10px;
    margin: 10px 0;
}
</style>
</head>
<body>

<header>
<h2>PhotoLibraryExplorer</h2>
<div>Persoonlijke kaart van je fotobibliotheek</div>
</header>

<nav>
<button class="active" onclick="showTab('kaart', this)">ð Kaart</button>
<button onclick="showTab('plaatsen', this)">ð Plaatsen</button>
<button onclick="showTab('top', this)">ð Top 100</button>
<button onclick="showTab('stats', this)">ð Statistiek</button>
</nav>

<section id="kaart" class="active">
<div class="panel">
Zoek:<br>
<input id="mapFilter" type="text" placeholder="plaats, provincie of land">
<br><br>
Min. betrouwbaarheid:
<input id="minconf" type="range" min="0" max="100" value="0">
<span id="minconfval">0</span>
<br>
<span id="mapCount"></span>
</div>
<div id="map"></div>
</section>

<section id="plaatsen">
<div class="panel">
<input id="placeFilter" type="text" placeholder="Zoek plaats, provincie of land">
</div>
<table>
<thead>
<tr>
<th>Land</th><th>Provincie</th><th>Plaats</th><th>Totaal</th><th>GPS</th><th>Geschat</th><th>Betrouwbaarheid</th>
</tr>
</thead>
<tbody id="placesBody"></tbody>
</table>
</section>

<section id="top">
<table>
<thead>
<tr>
<th>#</th><th>Plaats</th><th>Provincie</th><th>Land</th><th>Totaal</th>
</tr>
</thead>
<tbody id="topBody"></tbody>
</table>
</section>

<section id="stats">
<div id="statsBox"></div>
</section>

function showTab(id, btn) {
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    btn.classList.add("active");

    if (id === "kaart") {
        setTimeout(function() { map.invalidateSize(); }, 200);
    }
}

var map = L.map('map').setView([51.49, 5.39], 6);

L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
    subdomains: 'abc',
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var clusterGroup = L.markerClusterGroup({
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: false,
    maxClusterRadius: 45,
    disableClusteringAtZoom: 11
});

clusterGroup.on('clusterclick', function (a) {
    map.setView(a.layer.getLatLng(), Math.min(map.getZoom() + 2, 12));
});

var allMarkers = [];
var bounds = [];

PLAATSEN.forEach(function(p) {
    var title = [p.plaats, p.provincie, p.land].filter(Boolean).join(", ");

    var popup =
        "<b>" + title + "</b><br>" +
        "GPS-opnames: " + p.gps + "<br>" +
        "Geschat via tijd: " + p.geschat + "<br>" +
        "Totaal: " + p.totaal + "<br>" +
        "Gem. betrouwbaarheid: " + p.betrouwbaarheid + "<br>" +
        "Eerste: " + p.eerste + "<br>" +
        "Laatste: " + p.laatste + "<br>" +
        "<a target='_blank' href='https://www.google.com/maps?q=" + p.lat + "," + p.lon + "'>Open in Google Maps</a>";

    var marker = L.marker([p.lat, p.lon]);
    marker.bindPopup(popup);
    marker.searchText = title.toLowerCase();
    marker.avgConfidence = p.betrouwbaarheid;

    allMarkers.push(marker);
    clusterGroup.addLayer(marker);
    bounds.push([p.lat, p.lon]);
});

map.addLayer(clusterGroup);

function updateMapFilter() {
    var q = document.getElementById('mapFilter').value.toLowerCase();
    var minconf = parseInt(document.getElementById('minconf').value, 10);
    document.getElementById('minconfval').innerText = minconf;

    clusterGroup.clearLayers();
    var visible = 0;

    allMarkers.forEach(function(m) {
        if ((!q || m.searchText.indexOf(q) >= 0) && m.avgConfidence >= minconf) {
            clusterGroup.addLayer(m);
            visible++;
        }
    });

    document.getElementById('mapCount').innerText =
        visible + " van " + allMarkers.length + " plaatsen zichtbaar";
}

document.getElementById('mapFilter').addEventListener('input', updateMapFilter);
document.getElementById('minconf').addEventListener('input', updateMapFilter);

if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [20, 20], maxZoom: 9 });
}
updateMapFilter();

function renderPlaces() {
    var q = document.getElementById('placeFilter').value.toLowerCase();

    var rows = PLAATSEN
        .filter(p => !q || (p.land + " " + p.provincie + " " + p.plaats).toLowerCase().includes(q))
        .sort((a,b) =>
            a.land.localeCompare(b.land) ||
            a.provincie.localeCompare(b.provincie) ||
            a.plaats.localeCompare(b.plaats)
        );

    document.getElementById('placesBody').innerHTML = rows.map(p =>
        "<tr>" +
        "<td>" + p.land + "</td>" +
        "<td>" + p.provincie + "</td>" +
        "<td>" + p.plaats + "</td>" +
        "<td>" + p.totaal + "</td>" +
        "<td>" + p.gps + "</td>" +
        "<td>" + p.geschat + "</td>" +
        "<td>" + p.betrouwbaarheid + "</td>" +
        "</tr>"
    ).join("");
}

document.getElementById('placeFilter').addEventListener('input', renderPlaces);
renderPlaces();

function renderTop() {
    var rows = PLAATSEN
        .slice()
        .sort((a,b) => b.totaal - a.totaal)
        .slice(0, 100);

    document.getElementById('topBody').innerHTML = rows.map((p, i) =>
        "<tr>" +
        "<td>" + (i + 1) + "</td>" +
        "<td>" + p.plaats + "</td>" +
        "<td>" + p.provincie + "</td>" +
        "<td>" + p.land + "</td>" +
        "<td>" + p.totaal + "</td>" +
        "</tr>"
    ).join("");
}
renderTop();

function renderStats() {
    var totaal = PLAATSEN.reduce((s,p) => s + p.totaal, 0);
    var gps = PLAATSEN.reduce((s,p) => s + p.gps, 0);
    var geschat = PLAATSEN.reduce((s,p) => s + p.geschat, 0);

    var landen = {};
    var provincies = {};

    PLAATSEN.forEach(function(p) {
        if (p.land) landen[p.land] = true;
        if (p.provincie) provincies[p.provincie] = true;
    });

    document.getElementById('statsBox').innerHTML =
        "<div class='card'><b>Gekoppelde opnames totaal</b><br>" + totaal + "</div>" +
        "<div class='card'><b>GPS-opnames</b><br>" + gps + "</div>" +
        "<div class='card'><b>Geschat via tijd</b><br>" + geschat + "</div>" +
        "<div class='card'><b>Unieke plaatsen</b><br>" + PLAATSEN.length + "</div>" +
        "<div class='card'><b>Landen</b><br>" + Object.keys(landen).length + "</div>" +
        "<div class='card'><b>Provincies/regio's</b><br>" + Object.keys(provincies).length + "</div>";
}
renderStats();
</script>
