<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PhotoLibraryExplorer</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<style>
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; }
header { background: #1f2937; color: white; padding: 14px 18px; }
nav { background: white; padding: 10px; display: flex; gap: 10px; flex-wrap: wrap; box-shadow: 0 1px 4px #ccc; }
nav button { padding: 9px 14px; border: 0; border-radius: 8px; background: #e5e7eb; font-size: 15px; }
nav button.active { background: #2563eb; color: white; }
section { display: none; padding: 14px; }
section.active { display: block; }
#map { width: 100%; height: calc(100vh - 150px); }
.panel { background: white; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
input[type=text] { width: 95%; padding: 8px; }
table { width: 100%; border-collapse: collapse; background: white; }
th, td { border-bottom: 1px solid #ddd; padding: 7px; text-align: left; }
th { background: #eee; position: sticky; top: 0; }
.card { background: white; padding: 14px; border-radius: 10px; margin: 10px 0; }
.small { color: #666; font-size: 90%; }

.thumb-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    margin: 8px 0;
    max-width: 260px;
}
.thumb-grid img {
    width: 100%;
    height: 54px;
    object-fit: cover;
    border-radius: 6px;
    cursor: pointer;
}
.place-thumbs {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
}
.place-thumbs img {
    width: 48px;
    height: 48px;
    object-fit: cover;
    border-radius: 5px;
    cursor: pointer;
}
.lightbox {
    display: none;
    position: fixed;
    z-index: 5000;
    inset: 0;
    background: rgba(0,0,0,.85);
    align-items: center;
    justify-content: center;
}
.lightbox img {
    max-width: 94vw;
    max-height: 90vh;
    border-radius: 8px;
}
.lightbox .close {
    position: absolute;
    top: 15px;
    right: 20px;
    color: white;
    font-size: 32px;
    cursor: pointer;
}
</style>
</head>
<body>

<header>
<h2>📷🌍 PhotoLibraryExplorer</h2>
<div>Version 7.1</div>
</header>

<nav>
<button class="active" onclick="showTab('kaart', this)">🌍 Kaart</button>
<button onclick="showTab('plaatsen', this)">📍 Plaatsen</button>
<button onclick="showTab('top', this)">🏆 Top 100</button>
<button onclick="showTab('stats', this)">📊 Statistiek</button>
<button onclick="showTab('about', this)">ℹ️ Versie</button>
</nav>

<section id="kaart" class="active">
<div class="panel">
Zoek:<br>
<input id="mapFilter" type="text" placeholder="plaats, provincie of land">
<br><br>
Min. betrouwbaarheid:
<input id="minconf" type="range" min="0" max="100" value="0">
<span id="minconfval">0</span>
<br>
<span id="mapCount"></span>
</div>
<div id="map"></div>
</section>

<section id="plaatsen">
<div class="panel">
<input id="placeFilter" type="text" placeholder="Zoek plaats, provincie of land">
</div>
<table>
<thead>
<tr>
<th>Land</th><th>Provincie</th><th>Plaats</th><th>Miniaturen</th><th>Totaal</th><th>GPS</th><th>Geschat</th><th>Betrouwbaarheid</th>
</tr>
</thead>
<tbody id="placesBody"></tbody>
</table>
</section>

<section id="top">
<table>
<thead>
<tr><th>#</th><th>Plaats</th><th>Provincie</th><th>Land</th><th>Totaal</th></tr>
</thead>
<tbody id="topBody"></tbody>
</table>
</section>

<section id="stats">
<div id="statsBox"></div>
</section>

<section id="about">
<div class="card">
<h2>PhotoLibraryExplorer</h2>
<p>Version 7.1</p>
<p class="small">Ontwikkeld door Klaas Tanis met ChatGPT.</p>
<div id="aboutBox"></div>
</div>
</section>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
<span class="close">&times;</span>
<img id="lightboxImg" src="">
</div>

function esc(s) {
    return String(s || "").replace(/[&<>"']/g, function(c) {
        return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
    });
}

function showTab(id, btn) {
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    btn.classList.add("active");
    if (id === "kaart") setTimeout(function() { map.invalidateSize(); }, 200);
}

function openLightbox(event, url) {
    if (event) event.stopPropagation();
    document.getElementById("lightboxImg").src = url;
    document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
    document.getElementById("lightboxImg").src = "";
}

function thumbGrid(gallery) {
    if (!gallery || gallery.length === 0) return "";
    return "<div class='thumb-grid'>" + gallery.map(function(g) {
        return "<img src='" + esc(g.url) + "' title='" + esc(g.date) + "' onclick='openLightbox(event, \"" + esc(g.url) + "\")'>";
    }).join("") + "</div>";
}

function placeThumbs(gallery) {
    if (!gallery || gallery.length === 0) return "";
    return "<div class='place-thumbs'>" + gallery.slice(0, 4).map(function(g) {
        return "<img src='" + esc(g.url) + "' title='" + esc(g.date) + "' onclick='openLightbox(event, \"" + esc(g.url) + "\")'>";
    }).join("") + "</div>";
}

var map = L.map('map').setView([51.49, 5.39], 6);

L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
    subdomains: 'abc',
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var clusterGroup = L.markerClusterGroup({
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: false,
    maxClusterRadius: 45,
    disableClusteringAtZoom: 11
});

clusterGroup.on('clusterclick', function (a) {
    map.setView(a.layer.getLatLng(), Math.min(map.getZoom() + 2, 12));
});

var allMarkers = [];
var bounds = [];

PLAATSEN.forEach(function(p) {
    var title = [p.plaats, p.provincie, p.land].filter(Boolean).join(", ");
    var popup =
        "<b>" + esc(title) + "</b><br>" +
        thumbGrid(p.gallery) +
        "GPS-opnames: " + p.gps + "<br>" +
        "Geschat via tijd: " + p.geschat + "<br>" +
        "Totaal: " + p.totaal + "<br>" +
        "Gem. betrouwbaarheid: " + p.betrouwbaarheid + "<br>" +
        "Eerste: " + esc(p.eerste) + "<br>" +
        "Laatste: " + esc(p.laatste) + "<br>" +
        "<a target='_blank' href='https://www.google.com/maps?q=" + p.lat + "," + p.lon + "'>Open in Google Maps</a>";

    var marker = L.marker([p.lat, p.lon]);
    marker.bindPopup(popup, { maxWidth: 310 });
    marker.searchText = title.toLowerCase();
    marker.avgConfidence = p.betrouwbaarheid;

    allMarkers.push(marker);
    clusterGroup.addLayer(marker);
    bounds.push([p.lat, p.lon]);
});

map.addLayer(clusterGroup);

function updateMapFilter() {
    var q = document.getElementById('mapFilter').value.toLowerCase();
    var minconf = parseInt(document.getElementById('minconf').value, 10);
    document.getElementById('minconfval').innerText = minconf;

    clusterGroup.clearLayers();
    var visible = 0;

    allMarkers.forEach(function(m) {
        if ((!q || m.searchText.indexOf(q) >= 0) && m.avgConfidence >= minconf) {
            clusterGroup.addLayer(m);
            visible++;
        }
    });

    document.getElementById('mapCount').innerText =
        visible + " van " + allMarkers.length + " plaatsen zichtbaar";
}

document.getElementById('mapFilter').addEventListener('input', updateMapFilter);
document.getElementById('minconf').addEventListener('input', updateMapFilter);

if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [20, 20], maxZoom: 9 });
}
updateMapFilter();

function renderPlaces() {
    var q = document.getElementById('placeFilter').value.toLowerCase();

    var rows = PLAATSEN
        .filter(function(p) {
            return !q || (p.land + " " + p.provincie + " " + p.plaats).toLowerCase().includes(q);
        })
        .sort(function(a,b) {
            return a.land.localeCompare(b.land) ||
                   a.provincie.localeCompare(b.provincie) ||
                   a.plaats.localeCompare(b.plaats);
        });

    document.getElementById('placesBody').innerHTML = rows.map(function(p) {
        return "<tr>" +
        "<td>" + esc(p.land) + "</td>" +
        "<td>" + esc(p.provincie) + "</td>" +
        "<td>" + esc(p.plaats) + "</td>" +
        "<td>" + placeThumbs(p.gallery) + "</td>" +
        "<td>" + p.totaal + "</td>" +
        "<td>" + p.gps + "</td>" +
        "<td>" + p.geschat + "</td>" +
        "<td>" + p.betrouwbaarheid + "</td>" +
        "</tr>";
    }).join("");
}
document.getElementById('placeFilter').addEventListener('input', renderPlaces);
renderPlaces();

function renderTop() {
    var rows = PLAATSEN.slice().sort(function(a,b) { return b.totaal - a.totaal; }).slice(0, 100);
    document.getElementById('topBody').innerHTML = rows.map(function(p, i) {
        return "<tr>" +
        "<td>" + (i + 1) + "</td>" +
        "<td>" + esc(p.plaats) + "</td>" +
        "<td>" + esc(p.provincie) + "</td>" +
        "<td>" + esc(p.land) + "</td>" +
        "<td>" + p.totaal + "</td>" +
        "</tr>";
    }).join("");
}
renderTop();

function renderStats() {
    document.getElementById('statsBox').innerHTML =
        "<div class='card'><b>Totaal items met datum</b><br>" + STATS.total_assets + "</div>" +
        "<div class='card'><b>GPS-opnames</b><br>" + STATS.gps_count + "</div>" +
        "<div class='card'><b>Zonder GPS</b><br>" + STATS.no_gps_count + "</div>" +
        "<div class='card'><b>Geschat via tijd</b><br>" + STATS.matched_no_gps + "</div>" +
        "<div class='card'><b>Niet gekoppeld</b><br>" + STATS.unmatched_no_gps + "</div>" +
        "<div class='card'><b>Unieke plaatsen</b><br>" + STATS.unique_places + "</div>" +
        "<div class='card'><b>Landen</b><br>" + STATS.country_count + "</div>" +
        "<div class='card'><b>Provincies/regio's</b><br>" + STATS.province_count + "</div>";
}
renderStats();

function renderAbout() {
    document.getElementById('aboutBox').innerHTML =
        "<p><b>Totaal items met datum:</b> " + STATS.total_assets + "</p>" +
        "<p><b>GPS-opnames:</b> " + STATS.gps_count + "</p>" +

        "<p><b>Laatste gekoppelde opname:</b> " + esc(STATS.last) + "</p>" +
        "<p><b>Website:</b><br><a href='" + esc(STATS.github_url) + "'>" + esc(STATS.github_url) + "</a></p>" +
